<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>최첨단 로또번호</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(160deg, #0d0b1e 0%, #1b1648 50%, #0d1f3c 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      font-family: 'Segoe UI', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      color: #fff;
    }

    /* ── 헤더 ── */
    .header {
      width: 100%;
      text-align: center;
      padding: clamp(28px, 6vw, 56px) 20px clamp(16px, 3vw, 28px);
    }

    .title {
      font-size: clamp(1.7rem, 6vw, 2.8rem);
      font-weight: 900;
      letter-spacing: 3px;
      background: linear-gradient(90deg, #f7971e 0%, #ffd200 50%, #fff176 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      line-height: 1.2;
    }

    .subtitle {
      font-size: clamp(0.78rem, 2.5vw, 0.95rem);
      color: #8899bb;
      margin-top: 8px;
      letter-spacing: 2px;
    }

    /* ── 메인 카드 ── */
    .card {
      width: min(92%, 680px);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 28px;
      padding: clamp(28px, 5vw, 52px) clamp(20px, 4vw, 48px);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      margin-top: 8px;
    }

    /* ── 볼 영역 ── */
    .balls-wrapper {
      min-height: clamp(80px, 14vw, 110px);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: clamp(28px, 5vw, 44px);
    }

    .balls {
      display: flex;
      gap: clamp(8px, 2vw, 16px);
      flex-wrap: wrap;
      justify-content: center;
    }

    .ball {
      width: clamp(58px, 11vw, 82px);
      height: clamp(58px, 11vw, 82px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.35rem, 3.5vw, 1.85rem);
      font-weight: 900;
      letter-spacing: -0.5px;
      box-shadow:
        0 8px 24px rgba(0, 0, 0, 0.55),
        inset 0 -5px 10px rgba(0, 0, 0, 0.2),
        inset 0 5px 10px rgba(255, 255, 255, 0.35);
      opacity: 0;
      transform: scale(0.3) rotate(-30deg);
      transition: none;
      position: relative;
      cursor: default;
      user-select: none;
    }

    /* 하이라이트 반사 */
    .ball::before {
      content: '';
      position: absolute;
      top: 14%;
      left: 20%;
      width: 28%;
      height: 18%;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      transform: rotate(-35deg);
      pointer-events: none;
    }

    .ball.show {
      animation: ballPop 0.55s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes ballPop {
      0%   { opacity: 0; transform: scale(0.2) rotate(-40deg) translateY(-30px); }
      55%  { opacity: 1; transform: scale(1.18) rotate(6deg) translateY(2px); }
      78%  { transform: scale(0.94) rotate(-2deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg) translateY(0); }
    }

    /* ── 볼 색상: 한국 동행복권 공식 로또 6/45 규격 ── */
    /* 1~10  공식 노랑 #FBC400 → 짙은 갈색 텍스트 */
    .ball.yellow {
      background: radial-gradient(circle at 38% 30%, #ffe566, #FBC400 55%, #c99200);
      color: #3b2000;
      text-shadow: 0 1px 0 rgba(255,255,255,0.4);
    }
    /* 11~20 공식 파랑 #069CDB → 흰색 텍스트 */
    .ball.blue {
      background: radial-gradient(circle at 38% 30%, #62ccf5, #069CDB 55%, #0472a8);
      color: #ffffff;
      text-shadow: 0 1px 4px rgba(0,30,80,0.7);
    }
    /* 21~30 공식 빨강 #FF5002 → 흰색 텍스트 */
    .ball.red {
      background: radial-gradient(circle at 38% 30%, #ff8a50, #FF5002 55%, #cc3a00);
      color: #ffffff;
      text-shadow: 0 1px 4px rgba(80,10,0,0.6);
    }
    /* 31~40 공식 회색 #AAAAAA → 짙은 텍스트 */
    .ball.gray {
      background: radial-gradient(circle at 38% 30%, #d8d8d8, #AAAAAA 55%, #787878);
      color: #222222;
      text-shadow: 0 1px 0 rgba(255,255,255,0.5);
    }
    /* 41~45 공식 초록 #B0D840 → 짙은 텍스트 */
    .ball.green {
      background: radial-gradient(circle at 38% 30%, #d6f26a, #B0D840 55%, #86aa22);
      color: #1e3300;
      text-shadow: 0 1px 0 rgba(255,255,255,0.35);
    }

    /* ── 생성 버튼 ── */
    .btn-generate {
      position: relative;
      width: 100%;
      max-width: 340px;
      padding: clamp(15px, 3.5vw, 20px) 0;
      font-size: clamp(1rem, 3vw, 1.25rem);
      font-weight: 800;
      letter-spacing: 3px;
      color: #1a1200;
      background: linear-gradient(135deg, #f7971e 0%, #ffd200 60%, #ffe566 100%);
      border: none;
      border-radius: 60px;
      cursor: pointer;
      display: block;
      margin: 0 auto;
      box-shadow: 0 6px 32px rgba(247, 151, 30, 0.55), 0 2px 8px rgba(0,0,0,0.3);
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
      overflow: hidden;
    }

    .btn-generate::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #ffe566, #f7971e);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn-generate:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 44px rgba(247, 151, 30, 0.75), 0 4px 12px rgba(0,0,0,0.3);
      filter: brightness(1.06);
    }

    .btn-generate:hover::after { opacity: 1; }

    .btn-generate:active {
      transform: translateY(1px);
      box-shadow: 0 3px 14px rgba(247, 151, 30, 0.4);
    }

    .btn-generate:disabled {
      cursor: not-allowed;
      filter: brightness(0.7);
    }

    .btn-generate span {
      position: relative;
      z-index: 1;
    }

    .btn-inner {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-size: clamp(0.95rem, 2.8vw, 1.15rem);
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .btn-icon {
      width: clamp(18px, 3vw, 22px);
      height: clamp(18px, 3vw, 22px);
      flex-shrink: 0;
      color: #1a1200;
    }

    /* ── 히스토리 ── */
    .history-section {
      margin-top: clamp(16px, 3vw, 28px);
      width: min(92%, 680px);
      flex: 1;           /* 남은 세로 공간 모두 차지 */
      min-height: 0;     /* flex shrink 허용 */
      display: flex;
      flex-direction: column;
      padding-bottom: clamp(14px, 3vw, 24px);
    }

    .history-title {
      font-size: 0.78rem;
      color: #6677aa;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 12px;
      padding-left: 4px;
      flex-shrink: 0;
    }

    .history-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-right: 4px;   /* 스크롤바 공간 */
      padding-bottom: 4px;
    }

    /* ── 커스텀 스크롤바 (WebKit) ── */
    .history-list::-webkit-scrollbar {
      width: 5px;
    }
    .history-list::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
    }
    .history-list::-webkit-scrollbar-thumb {
      background: rgba(251,196,0,0.35);
      border-radius: 10px;
    }
    .history-list::-webkit-scrollbar-thumb:hover {
      background: rgba(251,196,0,0.6);
    }

    /* Firefox */
    .history-list {
      scrollbar-width: thin;
      scrollbar-color: rgba(251,196,0,0.35) rgba(255,255,255,0.04);
    }

    .history-item {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: clamp(10px, 2.5vw, 14px) clamp(14px, 3vw, 22px);
      display: flex;
      align-items: center;
      gap: 12px;
      animation: fadeSlide 0.35s ease forwards;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .history-round {
      font-size: 0.72rem;
      font-weight: 700;
      color: #8899bb;
      min-width: 26px;
      background: rgba(255,255,255,0.08);
      border-radius: 6px;
      padding: 3px 5px;
      text-align: center;
    }

    .history-balls {
      display: flex;
      gap: clamp(6px, 1.5vw, 10px);
      flex-wrap: wrap;
      align-items: center;
    }

    .mini-ball {
      width: clamp(36px, 7.5vw, 46px);
      height: clamp(36px, 7.5vw, 46px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(0.72rem, 1.8vw, 0.9rem);
      font-weight: 900;
      box-shadow: 0 3px 10px rgba(0,0,0,0.45), inset 0 2px 5px rgba(255,255,255,0.3);
      position: relative;
    }

    .mini-ball::before {
      content: '';
      position: absolute;
      top: 16%;
      left: 22%;
      width: 26%;
      height: 16%;
      background: rgba(255, 255, 255, 0.45);
      border-radius: 50%;
      transform: rotate(-30deg);
      pointer-events: none;
    }

    /* 미니볼 — 공식 규격 동일 적용 */
    .mini-ball.yellow {
      background: radial-gradient(circle at 38% 30%, #ffe566, #FBC400 55%, #c99200);
      color: #3b2000;
      text-shadow: 0 1px 0 rgba(255,255,255,0.4);
    }
    .mini-ball.blue {
      background: radial-gradient(circle at 38% 30%, #62ccf5, #069CDB 55%, #0472a8);
      color: #ffffff;
      text-shadow: 0 1px 3px rgba(0,30,80,0.7);
    }
    .mini-ball.red {
      background: radial-gradient(circle at 38% 30%, #ff8a50, #FF5002 55%, #cc3a00);
      color: #ffffff;
      text-shadow: 0 1px 3px rgba(80,10,0,0.6);
    }
    .mini-ball.gray {
      background: radial-gradient(circle at 38% 30%, #d8d8d8, #AAAAAA 55%, #787878);
      color: #222222;
      text-shadow: 0 1px 0 rgba(255,255,255,0.5);
    }
    .mini-ball.green {
      background: radial-gradient(circle at 38% 30%, #d6f26a, #B0D840 55%, #86aa22);
      color: #1e3300;
      text-shadow: 0 1px 0 rgba(255,255,255,0.35);
    }

    /* ── 색상 범례 ── */
    .legend {
      display: flex;
      gap: clamp(8px, 2vw, 14px);
      justify-content: center;
      flex-wrap: wrap;
      margin-top: clamp(20px, 4vw, 32px);
      padding-top: clamp(16px, 3vw, 24px);
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: clamp(0.65rem, 1.6vw, 0.75rem);
      color: #8899bb;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-dot.yellow { background: #FBC400; }
    .legend-dot.blue   { background: #069CDB; }
    .legend-dot.red    { background: #FF5002; }
    .legend-dot.gray   { background: #AAAAAA; }
    .legend-dot.green  { background: #B0D840; }

    /* ── 태블릿 / PC 추가 여백 ── */
    @media (min-width: 768px) {
      body { justify-content: center; }
    }

    /* ── 아주 작은 화면 (320px) ── */
    @media (max-width: 360px) {
      .ball { width: 50px; height: 50px; }
      .balls { gap: 7px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1 class="title">SUPER LOTTO NUMBER</h1>
    <p class="subtitle">최고의 숫자를 그대에게 &middot; LOTTO 6/45</p>
  </div>

  <div class="card">
    <div class="balls-wrapper">
      <div class="balls" id="balls"></div>
    </div>

    <button class="btn-generate" id="btnGenerate" onclick="generate()">
      <span class="btn-inner">
        <svg class="btn-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="10" cy="10" r="8.5" stroke="currentColor" stroke-width="1.6"/>
          <path d="M6.5 10 L10 6.5 L13.5 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M10 6.5 L10 13.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        GENERATE
      </span>
    </button>

    <div class="legend">
      <div class="legend-item"><span class="legend-dot yellow"></span>1~10</div>
      <div class="legend-item"><span class="legend-dot blue"></span>11~20</div>
      <div class="legend-item"><span class="legend-dot red"></span>21~30</div>
      <div class="legend-item"><span class="legend-dot gray"></span>31~40</div>
      <div class="legend-item"><span class="legend-dot green"></span>41~45</div>
    </div>
  </div>

  <div class="history-section" id="historySection" style="display:none;">
    <div class="history-title">&#9685; 이전 번호 기록</div>
    <div class="history-list" id="historyList"></div>
  </div>

  <script>
    const MAX_HISTORY = 20;
    const history = [];

    function getBallColor(n) {
      if (n <= 10) return 'yellow';
      if (n <= 20) return 'blue';
      if (n <= 30) return 'red';
      if (n <= 40) return 'gray';
      return 'green';
    }

    function pickNumbers() {
      const pool = Array.from({ length: 45 }, (_, i) => i + 1);
      for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      return pool.slice(0, 6).sort((a, b) => a - b);
    }

    function renderBalls(numbers) {
      const container = document.getElementById('balls');
      container.innerHTML = '';
      numbers.forEach((num, idx) => {
        const ball = document.createElement('div');
        ball.className = `ball ${getBallColor(num)}`;
        ball.textContent = num;
        container.appendChild(ball);
        setTimeout(() => ball.classList.add('show'), idx * 130);
      });
    }

    function renderHistory() {
      const section = document.getElementById('historySection');
      const list    = document.getElementById('historyList');

      if (history.length === 0) { section.style.display = 'none'; return; }

      section.style.display = 'flex';
      list.innerHTML = '';

      history.forEach((nums, i) => {
        const item = document.createElement('div');
        item.className = 'history-item';

        const label = document.createElement('span');
        label.className = 'history-round';
        label.textContent = `#${i + 1}`;
        item.appendChild(label);

        const ballsDiv = document.createElement('div');
        ballsDiv.className = 'history-balls';
        nums.forEach(n => {
          const b = document.createElement('div');
          b.className = `mini-ball ${getBallColor(n)}`;
          b.textContent = n;
          ballsDiv.appendChild(b);
        });
        item.appendChild(ballsDiv);
        list.appendChild(item);
      });

      list.scrollTop = 0; // 새 항목 추가 시 맨 위로
    }

    function generate() {
      const btn = document.getElementById('btnGenerate');
      btn.disabled = true;

      const numbers = pickNumbers();
      renderBalls(numbers);

      setTimeout(() => {
        history.unshift(numbers);
        if (history.length > MAX_HISTORY) history.length = MAX_HISTORY;
        renderHistory();
        btn.disabled = false;
      }, 6 * 130 + 600);
    }
  </script>
</body>
</html>
